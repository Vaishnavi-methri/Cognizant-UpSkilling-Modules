<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Feedback</title>

<style>

body{
    font-family:Arial;
    background:#f8f9fa;
    text-align:center;
}

.container{
    width:500px;
    margin:auto;
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px lightgray;
}

input,select,textarea{
    width:90%;
    padding:10px;
    margin:10px;
}

img{
    border-radius:10px;
    cursor:pointer;
}

button{
    padding:10px 20px;
    background:#198754;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

<script>

function validatePhone(){

    let phone =
    document.getElementById("phone").value;

    if(phone.length != 10){
        alert("Please enter 10 digit phone number");
    }
}

function showFee(){

    let fee =
    document.getElementById("event").value;

    document.getElementById("fee").innerHTML = fee;
}

function submitMsg(){
    alert("Feedback Submitted Successfully");
}

function enlargeImage(img){
    img.style.width="350px";
}

function countChar(){

    let text =
    document.getElementById("feedback").value;

    document.getElementById("count").innerHTML =
    text.length;
}

</script>

</head>
<body>

<div class="container">

<h2>Event Feedback Form</h2>

<input type="text"
id="phone"
placeholder="Enter Phone Number"
onblur="validatePhone()">

<br>

<select id="event"
onchange="showFee()">

<option value="₹100">Workshop</option>
<option value="₹200">Seminar</option>
<option value="₹300">Sports Event</option>

</select>

<p>Event Fee : <b id="fee"></b></p>

<img src="event.jpg"
width="180"
ondblclick="enlargeImage(this)"
title="Double Click Me">

<br><br>

<textarea id="feedback"
rows="5"
placeholder="Enter Feedback"
onkeyup="countChar()"></textarea>

<p>Characters : <span id="count">0</span></p>

<button onclick="submitMsg()">
Submit
</button>

</div>

</body>
</html>
