<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Events</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f8;
    text-align:center;
}

.box{
    margin-top:50px;
}

button{
    padding:12px 20px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
}

#result{
    margin-top:20px;
    font-weight:bold;
}

</style>

<script>

function findEvents(){

navigator.geolocation.getCurrentPosition(

function(position){

document.getElementById("result").innerHTML =

"Latitude : " +
position.coords.latitude +

"<br><br>Longitude : " +
position.coords.longitude;

},

function(error){

if(error.code==1){
alert("Permission Denied");
}
else{
alert("Location Timeout/Error");
}

},

{
enableHighAccuracy:true,
timeout:5000
}

);

}

</script>

</head>
<body>

<div class="box">

<h2>Find Nearby Events</h2>

<button onclick="findEvents()">
Find Nearby Events
</button>

<p id="result"></p>

</div>

</body>
</html>
