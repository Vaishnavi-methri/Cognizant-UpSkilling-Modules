<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Gallery</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fc;
    text-align:center;
}

table{
    margin:auto;
    border-spacing:15px;
}

.event-img{
    width:180px;
    height:120px;
    border:3px solid #0d6efd;
    border-radius:8px;
}

.caption{
    font-weight:bold;
    margin-top:5px;
}

</style>
</head>

<body>

<h1>Community Event Gallery</h1>

<table>

<tr>

<td>
<img src="event1.jpg" alt="Music Event"
title="Music Event" class="event-img">
<div class="caption">Music Festival</div>
</td>

<td>
<img src="event2.jpg" alt="Sports Event"
title="Sports Event" class="event-img">
<div class="caption">Sports Meet</div>
</td>

<td>
<img src="event3.jpg" alt="Food Event"
title="Food Event" class="event-img">
<div class="caption">Food Fair</div>
</td>

</tr>

<tr>

<td>
<img src="event4.jpg" alt="Art Event"
title="Art Event" class="event-img">
<div class="caption">Art Exhibition</div>
</td>

<td>
<img src="event5.jpg" alt="Book Event"
title="Book Event" class="event-img">
<div class="caption">Book Fair</div>
</td>

<td>
<img src="event6.jpg" alt="Dance Event"
title="Dance Event" class="event-img">
<div class="caption">Dance Show</div>
</td>

</tr>

</table>

</body>
</html>
