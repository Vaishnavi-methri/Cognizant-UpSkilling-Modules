<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Preferences</title>

<style>

body{
    font-family:Arial;
    background:#eef5ff;
    text-align:center;
}

.box{
    width:350px;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px lightgray;
}

button{
    padding:10px 15px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

<script>

function savePreference(){

    let eventType =
    document.getElementById("eventType").value;

    localStorage.setItem(
    "eventType",
    eventType
    );
}

function loadPreference(){

    let saved =
    localStorage.getItem("eventType");

    if(saved){
        document.getElementById("eventType").value =
        saved;
    }
}

function clearPreference(){

    localStorage.clear();
    sessionStorage.clear();

    alert("Preferences Cleared");
}

</script>

</head>

<body onload="loadPreference()">

<div class="box">

<h2>Select Event</h2>

<select id="eventType"
onchange="savePreference()">

<option>Workshop</option>
<option>Seminar</option>
<option>Sports</option>

</select>

<br><br>

<button onclick="clearPreference()">
Clear Preferences
</button>

</div>

</body>
</html>
