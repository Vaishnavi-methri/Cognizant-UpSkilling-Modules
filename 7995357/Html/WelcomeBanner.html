<!DOCTYPE html>
<html lang="en">
<head>

<title>Welcome Banner</title>

<style>

body{

#welcomeBanner{

    padding:25px;
    border-radius:10px;

    <h2>Welcome Shruti Keshri</h2>
    <p>Explore exciting community events.</p>
</div>

<p class="highlight">
    Registration Open Now
</p>

<p>
    Special Offer :
    <span style="color:red;font-weight:bold;">
        First 50 registrations are free.
    </span>
</p>

</body>
</html>
