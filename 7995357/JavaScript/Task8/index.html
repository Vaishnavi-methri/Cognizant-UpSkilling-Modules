<!DOCTYPE html>
<html>
<head>

<title>Event Handling</title>

<style>

body{
font-family:Arial;
background:#eef5ff;
text-align:center;
}

.card{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,
select{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="card">

<h2>🎯 Event Search</h2>

<input
type="text"
id="search"
placeholder="Search Event">

<select id="category">

<option>All</option>
<option>Music</option>
<option>Sports</option>

</select>

<p id="result"></p>

<button onclick="registerEvent()">
Register
</button>

</div>

<script src="main.js"></script>

</body>
</html>
