<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Welcome Banner</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f7fc;
    text-align:center;
    margin:0;
}

#welcomeBanner{
    background:#0d6efd;
    color:white;
    padding:25px;
    margin:30px auto;
    width:80%;
    border-radius:10px;
    box-shadow:0 0 10px lightgray;
}

.highlight{
    background:#fff3cd;
    color:#856404;
    padding:8px 12px;
    border-radius:5px;
    display:inline-block;
    margin-top:15px;
    font-weight:bold;
}

.card{
    background:white;
    width:70%;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px lightgray;
}

</style>

</head>

<body>

<div id="welcomeBanner">

    <h1>🎉 Welcome to Community Event Portal</h1>

    <p>
        Stay updated with local events, workshops,
        cultural programs and community activities.
    </p>

</div>

<div class="card">

    <h2>Hello Resident!</h2>

    <p>
        Register today and participate in exciting events.
    </p>

    <p>

        Special Offer :

        <span style="color:red;font-weight:bold;">
            First 50 registrations get free entry!
        </span>

    </p>

    <div class="highlight">
        Registration Open Now
    </div>

</div>

</body>

</html>
