<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Links and Lists</title>

<style>

nav ul{
    list-style:none;
    background:#0d6efd;
    padding:15px;
}

nav li{
    display:inline-block;
    margin-right:20px;
}

a:link{
    color:white;
    text-decoration:none;
}

a:hover{
    color:yellow;
}

a:active{
    color:red;
}

a:visited{
    color:#ddd;
}

.events{
    list-style-type:square;
    list-style-position:inside;
}

.events li{
    margin:10px;
    padding:5px;
}

</style>

</head>

<body>

<nav>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">Events</a></li>
<li><a href="#">Contact</a></li>

</ul>

</nav>

<h2>Upcoming Events</h2>

<ul class="events">

<li>Music Festival</li>
<li>Food Fair</li>
<li>Sports Meet</li>

</ul>

</body>
</html>
