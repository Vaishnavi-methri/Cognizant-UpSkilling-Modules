<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table Styling</title>

<style>

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
    text-align:center;
}

th{
    background:#0d6efd;
    color:white;
}

th,td{
    border:1px solid gray;
    padding:12px;
}

tr:nth-child(even){
    background:#f2f2f2;
}

</style>

</head>

<body>

<h2 align="center">
Event Schedule
</h2>

<table>

<tr>
<th>Event</th>
<th>Date</th>
<th>Venue</th>
</tr>

<tr>
<td>Music Festival</td>
<td>15 June</td>
<td>City Hall</td>
</tr>

<tr>
<td>Food Fair</td>
<td>20 June</td>
<td>Community Park</td>
</tr>

<tr>
<td>Sports Meet</td>
<td>25 June</td>
<td>Sports Complex</td>
</tr>

</table>

</body>
</html>
