<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color and Background Styling</title>

<style>

body{
    font-family:Arial,sans-serif;

    background-image:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200");

    background-size:cover;

    background-color:#eef5ff;
}

.header{

    background:
    linear-gradient(
        to right,
        #0d6efd,
        #6610f2
    );

    color:white;

    text-align:center;

    padding:20px;

    border-radius:10px;
}

.card{

    width:70%;

    margin:30px auto;

    padding:20px;

    background:
    rgba(255,255,255,0.85);

    border-radius:10px;
}

h2{
    color:#003366;
}

</style>
</head>

<body>

<div class="header">
    <h1>Community Event Portal</h1>
</div>

<div class="card">
    <h2>Upcoming Events</h2>
    <p>
        Explore exciting events happening in your city.
    </p>
</div>

</body>
</html>
