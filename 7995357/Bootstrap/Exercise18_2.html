<!DOCTYPE html>
<html>
<head>

Event FAQ Accordion
</h2>

<div class="accordion"

</h2>

id="faq1"

Community learning and networking.

</div>

</div>

</div>

<div class="accordion-item">

<h2 class="accordion-header">

<button
class="accordion-button collapsed"

</button>

</h2>

<div
id="faq2"
class="accordion-collapse collapse">

Use the registration form on the portal.

</div>

</div>

</div>

</div>

</div>
